name: Deploy client

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  DISABLE_CAPTURE: false

jobs:
  build_client:
    name: Build client
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Build client
        working-directory: client
        run: |
          yarn install
          yarn build

      - name: Create .env file for client
        working-directory: client
        run: |
          touch .env
          echo "REACT_APP_PUBLIC_POSTHOG_KEY=${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}" >> .env
          echo "REACT_APP_PUBLIC_POSTHOG_HOST=${{ secrets.REACT_APP_PUBLIC_POSTHOG_HOST }}" >> .env
          echo "DISABLE_CAPTURE=${{ env.DISABLE_CAPTURE }}" >> .env
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> .env
          echo "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}" >> .env

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy_client:
    name: Deploy client
    runs-on: ubuntu-latest
    needs: build_client
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "mars-client"
          slot-name: "Production"
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8EA4942242094AD895EA5CFA07827EE7 }}
