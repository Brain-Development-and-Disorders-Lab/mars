name: Deploy client

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  DISABLE_CAPTURE: false

jobs:
  deploy_client:
    runs-on: ubuntu-latest
    name: Deploy client
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Create .env file for client
        working-directory: client
        run: |
          touch .env
          echo "REACT_APP_PUBLIC_POSTHOG_KEY=${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}" >> .env
          echo "REACT_APP_PUBLIC_POSTHOG_HOST=${{ secrets.REACT_APP_PUBLIC_POSTHOG_HOST }}" >> .env
          echo "DISABLE_CAPTURE=${{ env.DISABLE_CAPTURE }}" >> .env
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> .env
          echo "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}" >> .env

      - name: Deploy to Azure
        id: deploy-static-web-app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_DESERT_070BF240F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/client"
          api_location: "/server"
          output_location: "/dist"
